<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AI 恋人</title>
  <link rel="manifest" href="/Palino-s-home/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #F5F1EA;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: #F5F1EA;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e0d6cb;
    }
    .header h1 { font-size: 18px; color: #333; }
    .settings-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #555; }

    .main-content { flex:1; overflow:hidden; display:flex; flex-direction:column; }
    .page { flex:1; display:none; flex-direction:column; overflow:hidden; }
    .page.active { display:flex; }

    .chat-container { flex:1; overflow-y:auto; padding:10px 12px; }
    .message-row { display:flex; margin-bottom:12px; align-items:center; }
    .message-row.me { justify-content:flex-end; }
    .avatar {
      width:36px; height:36px; border-radius:8px; background:#ccc; background-size:cover;
      background-position:center; flex-shrink:0;
    }
    .bubble {
      max-width:18em; min-width:2em; padding:10px 14px; background:rgba(215,201,184,0.9);
      border-radius:12px; word-break:break-word; font-size:15px; line-height:1.4;
      box-shadow:0 2px 2px rgba(184,169,154,0.4); white-space:pre-wrap;
    }
    .message-row.me .bubble { border-bottom-right-radius:4px; }
    .message-row.ai .bubble { border-bottom-left-radius:4px; }
    .message-row .avatar { margin:0 8px; }
    .timestamp { font-size:11px; color:#9e8f7f; margin-top:4px; text-align:right; }
    .me .timestamp { text-align:left; }

    .image-bubble { max-width:75%; border-radius:12px; overflow:hidden; box-shadow:0 2px 2px rgba(184,169,154,0.4); cursor:pointer; }
    .image-bubble img { width:100%; height:auto; display:block; }

    .file-bubble {
      display:flex; align-items:center; gap:10px; background:rgba(215,201,184,0.9);
      padding:10px; border-radius:12px; box-shadow:0 2px 2px rgba(184,169,154,0.4); cursor:pointer;
    }
    .file-bubble .file-icon { font-size:28px; }
    .file-bubble .file-info { display:flex; flex-direction:column; }
    .file-bubble .file-name { font-size:14px; font-weight:bold; }
    .file-bubble .file-size { font-size:12px; color:#666; }

    .input-area { background:#fff; padding:8px 12px; display:flex; gap:8px; border-top:1px solid #e0d6cb; }
    .input-area textarea, .input-area input {
      flex:1; padding:10px 16px; border:none; border-radius:24px; background:#F5F1EA; font-size:15px; outline:none;
      resize:none; max-height:120px; overflow-y:auto;
    }
    .attach-btn, .send-btn, .ai-btn {
      background:#b8a99a; border:none; color:white; font-size:18px; padding:0 16px; border-radius:24px; cursor:pointer; white-space:nowrap;
    }
    .ai-btn { background:#c69c6d; }
    .attach-btn { background:#8ab4a8; padding:0 12px; }

    .bottom-nav { height:56px; background:#fff; border-top:1px solid #e0d6cb; display:flex; justify-content:space-around; align-items:center; }
    .nav-item { flex:1; text-align:center; font-size:24px; color:#999; padding:8px 0; cursor:pointer; transition:color 0.2s; }
    .nav-item.active { color:#b8a99a; }
    .nav-item.chat-icon { font-size:28px; }

    .settings-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#F5F1EA; z-index:10; display:none; flex-direction:column; }
    .settings-overlay.active { display:flex; }
    .settings-header { background:#F5F1EA; padding:12px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid #e0d6cb; }
    .settings-header button { background:none; border:none; font-size:20px; cursor:pointer; }
    .settings-list { flex:1; overflow-y:auto; }
    .settings-item { display:flex; align-items:center; padding:14px 16px; border-bottom:1px solid #e8e0d5; cursor:pointer; background:#F5F1EA; }
    .settings-item:active { background:#e8e0d5; }
    .settings-item .icon { margin-right:12px; font-size:22px; }
    .settings-item .text { flex:1; font-size:16px; color:#333; }
    .settings-item .arrow { color:#999; }

    .sub-page { position:fixed; top:0; left:0; width:100%; height:100%; background:#F5F1EA; z-index:20; display:none; flex-direction:column; }
    .sub-page.active { display:flex; }
    .sub-header { background:#F5F1EA; padding:12px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid #e0d6cb; }
    .sub-content { flex:1; padding:16px; overflow-y:auto; }
    .sub-content input, .sub-content textarea {
      width:100%; padding:10px; margin-top:6px; margin-bottom:16px; border:1px solid #d4c9bb; border-radius:8px; background:#fff; font-size:15px;
    }
    .sub-content button { background:#b8a99a; color:white; border:none; padding:10px 20px; border-radius:8px; font-size:15px; cursor:pointer; }
    .avatar-edit { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
    .avatar-edit .avatar-preview { width:60px; height:60px; border-radius:8px; background-size:cover; background-position:center; border:2px solid #d4c9bb; }
    .couple-pair { display:flex; gap:12px; align-items:center; margin-bottom:12px; cursor:pointer; }
    .couple-pair img { width:50px; height:50px; border-radius:8px; object-fit:cover; }
    .search-result { padding:12px; border-bottom:1px solid #e8e0d5; cursor:pointer; }
    .search-result:active { background:#e8e0d5; }
    .import-status { margin-top:8px; font-weight:bold; }

    .memory-section { margin-bottom:20px; }
    .memory-section h3 { font-size:16px; margin-bottom:8px; color:#555; }
    .memory-item {
      background:#fff; border-left:4px solid #b8a99a; padding:8px 12px; margin-bottom:8px; border-radius:4px;
      display:flex; justify-content:space-between; align-items:center;
    }
    .memory-text { font-size:14px; flex:1; }
    .memory-time { font-size:12px; color:#999; margin-right:8px; }
    .memory-actions { display:flex; gap:6px; }
    .memory-actions button { background:none; border:none; cursor:pointer; font-size:16px; }

    .memory-edit-card {
      background: #fff; border-radius: 12px; padding: 16px; margin-top: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: none;
    }
    .memory-edit-card.active { display: block; }
    .memory-edit-card label { font-size: 14px; color: #555; margin-bottom: 4px; display: block; }
    .memory-edit-card input, .memory-edit-card textarea {
      width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #d4c9bb; border-radius: 8px; font-size: 14px;
    }
    .memory-edit-card .edit-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .memory-edit-card .edit-actions button { padding: 8px 16px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .memory-edit-card .save-btn { background: #b8a99a; color: white; }
    .memory-edit-card .cancel-btn { background: #e0d6cb; color: #333; }

    .bubble-menu {
      position:fixed; background:white; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.2);
      display:none; flex-direction:column; z-index:99; overflow:hidden;
    }
    .bubble-menu button {
      padding:10px 16px; border:none; background:none; font-size:14px; text-align:left; cursor:pointer; white-space:nowrap;
    }
    .bubble-menu button:active { background:#f0ece6; }

    .quote-bubble {
      background:rgba(215,201,184,0.4); border-radius:6px; padding:4px 8px; margin-top:4px;
      font-size:12px; color:#8a7b6e; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%;
    }

    .message-row.selectable { cursor: pointer; }
    .message-row.selected .bubble, .message-row.selected .image-bubble, .message-row.selected .file-bubble {
      outline: 3px solid #c69c6d; outline-offset: 2px;
    }
    .select-toolbar {
      display: none;
      position: absolute; bottom: 60px; left: 0; right: 0;
      background: #fff; border-top: 1px solid #e0d6cb; padding: 8px 16px; text-align: center; z-index: 5;
    }
    .select-toolbar.active { display: block; }
    .select-toolbar button { margin: 0 8px; padding: 6px 16px; background: #b8a99a; color: white; border: none; border-radius: 8px; }

    .think-header {
      font-size: 13px; color: #b8a99a; cursor: pointer; margin: 4px 0; user-select: none;
    }
    .think-content {
      font-size: 13px; color: #8a7b6e; background: rgba(215,201,184,0.3); border-radius: 8px; padding: 8px 12px;
      margin-top: 4px; display: none; white-space: pre-wrap;
    }
    .think-content.open { display: block; }

    .anniv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .anniv-card {
      border-radius: 12px; padding: 12px; color: white; display: flex; flex-direction: column; justify-content: space-between;
      aspect-ratio: 1 / 1; position: relative; cursor: pointer; transition: transform 0.1s; box-shadow: 0 2px 6px rgba(0,0,0,0.1); background: #b8a99a;
    }
    .anniv-card:active { transform: scale(0.97); }
    .anniv-card .title { font-size: 14px; font-weight: bold; }
    .anniv-card .days { font-size: 28px; font-weight: bold; margin: 4px 0; }
    .anniv-card .subtitle { font-size: 12px; opacity: 0.9; }

    .heatmap-container { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
    .heatmap-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .heatmap-month { font-size: 16px; font-weight: bold; color: #333; }
    .heatmap-nav { display: flex; gap: 8px; }
    .heatmap-nav button { background: #f0ece6; border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 14px; }
    .heatmap-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
    .heatmap-cell {
      aspect-ratio: 1; border-radius: 4px; font-size: 10px; display: flex; align-items: center; justify-content: center;
      color: #666; background: #f5f1ea;
    }
    .heatmap-cell.empty { background: #faf8f5; color: #ccc; }

    .typing-hint { text-align: center; color: #999; font-size: 13px; padding: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <h1 id="headerTitle">💞 小爱</h1>
    <button class="settings-btn" onclick="openSettings()">⚙️</button>
  </div>

  <div class="main-content">
    <div class="page active" id="chatPage">
      <div class="chat-container" id="chatContainer"></div>
      <div class="select-toolbar" id="selectToolbar">
        <button onclick="deleteSelectedMessages()">🗑️ 删除选中</button>
        <button onclick="cancelSelectMode()">取消</button>
      </div>
      <div class="input-area">
        <button class="attach-btn" onclick="attachFile()">📎</button>
        <textarea id="msgInput" placeholder="说点什么..." rows="1" autofocus></textarea>
        <button class="send-btn" onclick="sendUserMessage()" title="发送消息">📤</button>
        <button class="ai-btn" onclick="triggerAIReply()" title="让AI回复">✨</button>
      </div>
    </div>

    <div class="page" id="memoryPage">
      <div class="sub-content">
        <div class="memory-section">
          <h3>🧠 核心记忆</h3>
          <div id="coreMemoryList"></div>
          <button onclick="showAddMemoryForm('core')">＋ 添加核心记忆</button>
          <div class="memory-edit-card" id="coreEditCard">
            <label>时间</label>
            <input type="text" id="coreEditTime" placeholder="如 2024-03-15 14:30，留空使用当前时间">
            <label>事件</label>
            <textarea id="coreEditEvent" rows="2" placeholder="发生了什么..."></textarea>
            <label>感受</label>
            <textarea id="coreEditFeeling" rows="2" placeholder="你的感受..."></textarea>
            <div class="edit-actions">
              <button class="cancel-btn" onclick="hideEditForm('core')">取消</button>
              <button class="save-btn" onclick="saveMemoryFromForm('core')">保存</button>
            </div>
          </div>
        </div>
        <div class="memory-section">
          <h3>⭐ 重要事件</h3>
          <div id="importantMemoryList"></div>
          <button onclick="showAddMemoryForm('important')">＋ 添加重要事件</button>
          <div class="memory-edit-card" id="importantEditCard">
            <label>时间</label>
            <input type="text" id="importantEditTime" placeholder="如 2024-03-15 14:30，留空使用当前时间">
            <label>事件</label>
            <textarea id="importantEditEvent" rows="2" placeholder="发生了什么..."></textarea>
            <label>感受</label>
            <textarea id="importantEditFeeling" rows="2" placeholder="你的感受..."></textarea>
            <div class="edit-actions">
              <button class="cancel-btn" onclick="hideEditForm('important')">取消</button>
              <button class="save-btn" onclick="saveMemoryFromForm('important')">保存</button>
            </div>
          </div>
        </div>
        <div class="memory-section">
          <h3>📅 日常记忆</h3>
          <div id="dailyMemoryList"></div>
          <button onclick="showAddMemoryForm('daily')">＋ 添加日常记忆</button>
          <div class="memory-edit-card" id="dailyEditCard">
            <label>时间</label>
            <input type="text" id="dailyEditTime" placeholder="如 2024-03-15 14:30，留空使用当前时间">
            <label>事件</label>
            <textarea id="dailyEditEvent" rows="2" placeholder="发生了什么..."></textarea>
            <label>感受</label>
            <textarea id="dailyEditFeeling" rows="2" placeholder="你的感受..."></textarea>
            <div class="edit-actions">
              <button class="cancel-btn" onclick="hideEditForm('daily')">取消</button>
              <button class="save-btn" onclick="saveMemoryFromForm('daily')">保存</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="page" id="journalPage">
      <div class="sub-content">
        <h3 style="margin-bottom:12px;">💕 纪念日</h3>
        <div class="anniv-grid" id="annivGrid"></div>
        <button onclick="showAddAnniversaryForm()">＋ 添加纪念日</button>
        <div class="memory-edit-card" id="annivEditCard">
          <label>标题</label>
          <input type="text" id="annivTitle">
          <label>日期</label>
          <input type="date" id="annivDate">
          <label>类型</label>
          <select id="annivType" style="width:100%; padding:10px; margin-bottom:12px; border:1px solid #d4c9bb; border-radius:8px;">
            <option value="countup">正数日（从那天至今）</option>
            <option value="countdown">倒数日（距离那天还有）</option>
          </select>
          <label>显示单位</label>
          <select id="annivUnit" style="width:100%; padding:10px; margin-bottom:12px; border:1px solid #d4c9bb; border-radius:8px;">
            <option value="days">天</option>
            <option value="months">月</option>
            <option value="years">年</option>
          </select>
          <label>卡片颜色</label>
          <input type="color" id="annivColor" value="#b8a99a" style="width:100%; height:40px; border:none; border-radius:8px; cursor:pointer;">
          <div class="edit-actions">
            <button class="cancel-btn" onclick="hideAnnivForm()">取消</button>
            <button class="save-btn" onclick="saveAnniversary()">保存</button>
          </div>
        </div>

        <h3 style="margin-top:20px; margin-bottom:12px;">🔥 聊天热力图</h3>
        <div class="heatmap-container">
          <div class="heatmap-header">
            <span class="heatmap-month" id="heatmapMonthLabel"></span>
            <div class="heatmap-nav">
              <button onclick="changeHeatmapMonth(-1)">◀</button>
              <button onclick="changeHeatmapMonth(1)">▶</button>
            </div>
          </div>
          <div class="heatmap-grid" id="heatmapGrid"></div>
          <div style="margin-top:8px; font-size:11px; color:#999;">颜色深浅反映当日聊天条数（白色=0，深棕=1500+）</div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <span class="nav-item" onclick="switchPage('placeholder1')">🔲</span>
    <span class="nav-item" onclick="switchPage('journal')">📝</span>
    <span class="nav-item chat-icon active" onclick="switchPage('chat')">💬</span>
    <span class="nav-item" onclick="switchPage('memory')">🧠</span>
    <span class="nav-item" onclick="switchPage('placeholder3')">🔲</span>
  </div>

  <div class="settings-overlay" id="settingsOverlay">
    <div class="settings-header">
      <button onclick="closeSettings()">← 返回</button>
      <h2>设置</h2>
    </div>
    <div class="settings-list">
      <div class="settings-item" onclick="openRoleInfo()"><span class="icon">👤</span><span class="text">角色信息</span><span class="arrow">›</span></div>
      <div class="settings-item" onclick="openCoupleAvatarsPage()"><span class="icon">💑</span><span class="text">情侣头像</span><span class="arrow">›</span></div>
      <div class="settings-item" onclick="openApiConfig()"><span class="icon">🔑</span><span class="text">API 配置</span><span class="arrow">›</span></div>
      <div class="settings-item" onclick="openSearch()"><span class="icon">🔍</span><span class="text">聊天记录查找</span><span class="arrow">›</span></div>
      <div class="settings-item" onclick="openDialogSettings()"><span class="icon">⚙️</span><span class="text">对话设置</span><span class="arrow">›</span></div>
      <div class="settings-item" onclick="openDataManage()"><span class="icon">💾</span><span class="text">数据管理</span><span class="arrow">›</span></div>
    </div>
  </div>

  <div class="sub-page" id="roleInfoPage">
    <div class="sub-header"><button onclick="closeSubPage('roleInfoPage')">← 返回</button><h3>角色信息</h3></div>
    <div class="sub-content">
      <div class="avatar-edit">
        <div class="avatar-preview" id="roleAvatarPreview"></div>
        <button onclick="changeRoleAvatar()">更换头像</button>
      </div>
      <label>姓名</label><input type="text" id="roleName" placeholder="AI 名字">
      <label>性别</label>
      <input type="text" value="宝宝的专属小狗" readonly style="background:#f0ece6;">
      <label>补充信息</label><textarea id="roleExtraInfo" rows="3" placeholder="更多描述..."></textarea>
      <button onclick="saveRoleInfo()">保存</button>
    </div>
  </div>

  <div class="sub-page" id="coupleAvatarsPage">
    <div class="sub-header"><button onclick="closeSubPage('coupleAvatarsPage')">← 返回</button><h3>情侣头像</h3></div>
    <div class="sub-content">
      <div id="coupleList"></div>
      <button onclick="showAddCoupleForm()" id="showAddCoupleBtn">＋ 添加配对</button>
      <div class="memory-edit-card" id="coupleAddCard" style="margin-top:16px;">
        <label>配对名称</label>
        <input type="text" id="couplePairName" placeholder="例如：日常">
        <div style="display:flex; gap:16px; margin-bottom:12px;">
          <div style="flex:1; text-align:center;">
            <label>AI 头像</label>
            <div class="avatar-edit" style="justify-content:center;">
              <div class="avatar-preview" id="aiAvatarPreview" style="width:60px; height:60px; border-radius:8px; background:#ddd;"></div>
            </div>
            <button onclick="document.getElementById('aiAvatarInput').click()" style="margin-top:6px;">选择图片</button>
            <input type="file" id="aiAvatarInput" accept="image/*" style="display:none;" onchange="previewAvatar('ai')">
          </div>
          <div style="flex:1; text-align:center;">
            <label>我的头像</label>
            <div class="avatar-edit" style="justify-content:center;">
              <div class="avatar-preview" id="myAvatarPreview" style="width:60px; height:60px; border-radius:8px; background:#ddd;"></div>
            </div>
            <button onclick="document.getElementById('myAvatarInput').click()" style="margin-top:6px;">选择图片</button>
            <input type="file" id="myAvatarInput" accept="image/*" style="display:none;" onchange="previewAvatar('my')">
          </div>
        </div>
        <div class="edit-actions">
          <button class="cancel-btn" onclick="hideAddCoupleForm()">取消</button>
          <button class="save-btn" onclick="saveNewCouplePair()">保存</button>
        </div>
      </div>
    </div>
  </div>

  <div class="sub-page" id="apiConfigPage">
    <div class="sub-header"><button onclick="closeSubPage('apiConfigPage')">← 返回</button><h3>API 配置</h3></div>
    <div class="sub-content">
      <label>API 地址</label><input type="text" id="apiUrl">
      <label>API 密钥</label><input type="password" id="apiKey">
      <label>模型</label><input type="text" id="modelName">
      <button onclick="fetchModels()">提取模型列表</button>
      <select id="modelSelect" style="width:100%; padding:10px; margin-top:8px;"></select>
      <br><br>
      <button onclick="saveApiConfig()">保存</button>
    </div>
  </div>

  <div class="sub-page" id="searchPage">
    <div class="sub-header"><button onclick="closeSubPage('searchPage')">← 返回</button><h3>查找聊天记录</h3></div>
    <div class="sub-content">
      <input type="text" id="searchKeyword" placeholder="输入关键词" oninput="performSearch()">
      <div id="searchResults"></div>
    </div>
  </div>

  <div class="sub-page" id="dialogSettingsPage">
    <div class="sub-header"><button onclick="closeSubPage('dialogSettingsPage')">← 返回</button><h3>对话设置</h3></div>
    <div class="sub-content">
      <label>上下文轮数</label>
      <input type="number" id="contextRounds" min="1" max="20" value="4">
      <button onclick="saveDialogSettings()">保存</button>
    </div>
  </div>

  <div class="sub-page" id="dataManagePage">
    <div class="sub-header"><button onclick="closeSubPage('dataManagePage')">← 返回</button><h3>数据管理</h3></div>
    <div class="sub-content">
      <p>备份聊天记录和设置，或从备份恢复。</p>
      <button onclick="exportData()">📤 导出数据</button>
      <br><br>
      <label>📥 导入数据</label>
      <input type="file" id="importFile" accept=".json" onchange="importData()">
      <div id="importStatus" class="import-status"></div>
    </div>
  </div>

  <div class="bubble-menu" id="bubbleMenu">
    <button onclick="quoteMessage()">💬 引用</button>
    <button onclick="deleteSingleMessage()">🗑️ 删除本条</button>
    <button onclick="deleteMessagesBelow()">🗑️ 删除此条及以下</button>
    <button onclick="enterSelectModeFromMenu()">✅ 多选删除</button>
  </div>

  <script>
    const DB_NAME = 'AiLoverDB';
    let db;
    let messages = [];
    let settings = {
      roleName: '小爱',
      roleInfo: '温柔体贴',
      roleAvatar: '',
      apiUrl: '',
      apiKey: '',
      model: 'gpt-3.5-turbo',
      contextRounds: 4,
      coupleAvatars: [],
      memories: { core: [], important: [], daily: [] },
      anniversaries: [],
      dailyMessageCounts: {},
      totalMessageCount: 0,
      apiPrice: 0,
      lastArchiveDate: ''
    };

    let currentMenuMsgIndex = null;
    let pendingQuote = null;
    let currentEditIndex = { core: -1, important: -1, daily: -1 };
    let currentAnnivIndex = -1;
    let heatmapYearMonth = new Date();
    let selectMode = false;
    let selectedMessageIndices = new Set();

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 3);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('messages')) db.createObjectStore('messages', { keyPath: 'id', autoIncrement: true });
          if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'key' });
        };
        request.onsuccess = (e) => { db = e.target.result; resolve(db); };
        request.onerror = (e) => reject(e);
      });
    }

    async function loadMessages() {
      const tx = db.transaction('messages', 'readonly');
      const store = tx.objectStore('messages');
      const all = await new Promise(resolve => { const req = store.getAll(); req.onsuccess = () => resolve(req.result); });
      messages = all.sort((a,b) => a.id - b.id);
      renderChat();
    }

    async function saveMessage(msg) {
      const tx = db.transaction('messages', 'readwrite');
      const store = tx.objectStore('messages');
      await store.add(msg);
    }

    async function loadSettings() {
      const tx = db.transaction('settings', 'readonly');
      const store = tx.objectStore('settings');
      const keys = ['roleName','roleInfo','roleAvatar','apiUrl','apiKey','model','contextRounds','coupleAvatars','memories','anniversaries','dailyMessageCounts','totalMessageCount','apiPrice','lastArchiveDate'];
      for (let k of keys) {
        const req = store.get(k);
        const result = await new Promise(resolve => { req.onsuccess = () => resolve(req.result); });
        if (result !== undefined) settings[k] = result.value;
      }
      if (!settings.memories) settings.memories = { core: [], important: [], daily: [] };
      if (!settings.anniversaries) settings.anniversaries = [];
      if (!settings.dailyMessageCounts) settings.dailyMessageCounts = {};
      if (settings.totalMessageCount === undefined) settings.totalMessageCount = 0;
      if (settings.apiPrice === undefined) settings.apiPrice = 0;
      if (!settings.lastArchiveDate) settings.lastArchiveDate = '';
      updateHeaderTitle();
    }

    async function saveSetting(key, value) {
      const tx = db.transaction('settings', 'readwrite');
      const store = tx.objectStore('settings');
      await store.put({ key, value });
    }

    function getTimeString() {
      const now = new Date();
      return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    }
    function getFullTimeString() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${getTimeString()}`;
    }
    function getDateString(date = new Date()) {
      return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    }

    function updateHeaderTitle() {
      const titleEl = document.getElementById('headerTitle');
      if (titleEl) titleEl.textContent = '💞 ' + (settings.roleName || '小爱');
    }

    function switchPage(target) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      if (target === 'chat') {
        document.getElementById('chatPage').classList.add('active');
        document.querySelector('.chat-icon').classList.add('active');
      } else if (target === 'memory') {
        document.getElementById('memoryPage').classList.add('active');
        document.querySelector('.nav-item:nth-child(4)').classList.add('active');
        renderAllMemories();
      } else if (target === 'journal') {
        document.getElementById('journalPage').classList.add('active');
        document.querySelector('.nav-item:nth-child(2)').classList.add('active');
        renderAnniversaries();
        renderHeatmap();
      }
    }

    function incrementDailyCount() {
      const today = getDateString();
      if (!settings.dailyMessageCounts[today]) settings.dailyMessageCounts[today] = 0;
      settings.dailyMessageCounts[today]++;
      settings.totalMessageCount++;
      saveSetting('dailyMessageCounts', settings.dailyMessageCounts);
      saveSetting('totalMessageCount', settings.totalMessageCount);
    }

    function renderChat() {
      const container = document.getElementById('chatContainer');
      container.innerHTML = '';
      let thinkContent = null;
      messages.forEach((msg, index) => {
        if (msg.role === 'ai' && msg.content.includes('<think>')) {
          const match = msg.content.match(/<think>([\s\S]*?)<\/think>/);
          if (match) {
            thinkContent = match[1].trim();
            msg.content = msg.content.replace(/<think>[\s\S]*?<\/think>/g, '').trim();
          }
        }

        const row = document.createElement('div');
        row.className = `message-row ${msg.role === 'user' ? 'me' : 'ai'}`;
        if (selectMode) row.classList.add('selectable');
        if (selectedMessageIndices.has(index)) row.classList.add('selected');
        row.dataset.msgIndex = index;

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        const avatarSrc = msg.role === 'user' ? (settings.coupleAvatars.length > 0 ? settings.coupleAvatars[0]?.my : '') : (settings.roleAvatar || '');
        if (avatarSrc) avatar.style.backgroundImage = `url(${avatarSrc})`;
        else {
          avatar.style.background = msg.role === 'user' ? '#a0c4ff' : '#ffc6ff';
          avatar.style.display = 'flex'; avatar.style.alignItems = 'center'; avatar.style.justifyContent = 'center';
          avatar.style.fontSize = '20px'; avatar.textContent = msg.role === 'user' ? '👤' : '🤖';
        }

        if (msg.role === 'ai' && thinkContent !== null) {
          const thinkDiv = document.createElement('div');
          thinkDiv.className = 'think-header';
          thinkDiv.textContent = '💭 Palino的心里话';
          const thinkBody = document.createElement('div');
          thinkBody.className = 'think-content';
          thinkBody.textContent = thinkContent;
          thinkDiv.onclick = () => thinkBody.classList.toggle('open');
          container.appendChild(thinkDiv);
          container.appendChild(thinkBody);
          thinkContent = null;
        }

        let bubbleElement;
        if (msg.type === 'image') {
          bubbleElement = document.createElement('div'); bubbleElement.className = 'image-bubble';
          const img = document.createElement('img'); img.src = msg.content; img.onclick = () => window.open(msg.content, '_blank');
          bubbleElement.appendChild(img);
        } else if (msg.type === 'file') {
          bubbleElement = document.createElement('div'); bubbleElement.className = 'file-bubble';
          bubbleElement.innerHTML = `<span class="file-icon">📄</span><div class="file-info"><span class="file-name">${msg.fileName || '文件'}</span><span class="file-size">${msg.fileSize || ''}</span></div>`;
          bubbleElement.onclick = () => {
            const blob = new Blob([msg.content], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = msg.fileName || 'file'; a.click(); URL.revokeObjectURL(url);
          };
        } else {
          bubbleElement = document.createElement('div'); bubbleElement.className = 'bubble'; bubbleElement.textContent = msg.content;
        }

        const wrapper = document.createElement('div');
        wrapper.style.display = 'flex'; wrapper.style.flexDirection = 'column'; wrapper.style.maxWidth = '75%';
        wrapper.appendChild(bubbleElement);

        if (msg.quoted) {
          const quoteDiv = document.createElement('div');
          quoteDiv.className = 'quote-bubble';
          quoteDiv.textContent = msg.quoted.content;
          wrapper.appendChild(quoteDiv);
        }

        const time = document.createElement('div');
        time.className = 'timestamp'; time.textContent = msg.timestamp || '';
        wrapper.appendChild(time);

        if (msg.role === 'user') { row.appendChild(wrapper); row.appendChild(avatar); }
        else { row.appendChild(avatar); row.appendChild(wrapper); }

        row.addEventListener('click', (e) => {
          if (selectMode) {
            e.preventDefault();
            toggleSelectMessage(index);
          }
        });
        row.addEventListener('dblclick', (e) => {
          if (!selectMode) {
            e.preventDefault();
            setQuoteFromMessage(index);
          }
        });
        row.addEventListener('contextmenu', e => {
          e.preventDefault();
          if (!selectMode) showBubbleMenu(index, e.pageX, e.pageY);
        });
        row.addEventListener('touchstart', function(e) {
          if (selectMode) return;
          this.holdTimer = setTimeout(() => showBubbleMenu(index, e.touches[0].pageX, e.touches[0].pageY), 600);
        });
        row.addEventListener('touchend', function(e) { clearTimeout(this.holdTimer); });
        row.addEventListener('touchmove', function(e) { clearTimeout(this.holdTimer); });

        container.appendChild(row);
      });
      container.scrollTop = container.scrollHeight;
    }

    // 多选功能
    function toggleSelectMessage(index) {
      if (selectedMessageIndices.has(index)) selectedMessageIndices.delete(index);
      else selectedMessageIndices.add(index);
      renderChat();
      updateSelectToolbar();
    }
    function updateSelectToolbar() {
      const toolbar = document.getElementById('selectToolbar');
      if (selectMode && selectedMessageIndices.size > 0) toolbar.classList.add('active');
      else toolbar.classList.remove('active');
    }
    function enterSelectMode() {
      selectMode = true;
      selectedMessageIndices.clear();
      renderChat();
      document.getElementById('selectToolbar').classList.remove('active');
      hideBubbleMenu();
    }
    function enterSelectModeFromMenu() { hideBubbleMenu(); enterSelectMode(); }
    function cancelSelectMode() {
      selectMode = false;
      selectedMessageIndices.clear();
      renderChat();
      document.getElementById('selectToolbar').classList.remove('active');
    }
    async function deleteSelectedMessages() {
      if (selectedMessageIndices.size === 0) return;
      if (!confirm(`确定删除选中的 ${selectedMessageIndices.size} 条消息吗？`)) return;
      const indices = Array.from(selectedMessageIndices).sort((a,b) => b - a);
      const tx = db.transaction('messages', 'readwrite');
      const store = tx.objectStore('messages');
      for (const idx of indices) {
        const msg = messages[idx];
        if (msg && msg.id !== undefined) await store.delete(msg.id);
        messages.splice(idx, 1);
      }
      await tx.done;
      cancelSelectMode();
      renderChat();
    }

    function setQuoteFromMessage(index) {
      const msg = messages[index];
      if (!msg) return;
      pendingQuote = { id: msg.id, content: msg.content.length > 50 ? msg.content.substring(0, 50) + '...' : msg.content };
      document.getElementById('msgInput').placeholder = '引用回复...';
      document.getElementById('msgInput').focus();
    }

    async function sendUserMessage() {
      if (selectMode) return;
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text) return;
      const msg = { role: 'user', type: 'text', content: text, timestamp: getTimeString() };
      if (pendingQuote) { msg.quoted = pendingQuote; pendingQuote = null; input.placeholder = '说点什么...'; }
      messages.push(msg);
      await saveMessage(msg);
      incrementDailyCount();
      input.value = '';
      input.style.height = 'auto';
      renderChat();
    }

    async function attachFile() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*,.txt,.doc,.docx,.pdf';
      input.onchange = async () => {
        const file = input.files[0];
        if (!file) return;
        if (file.type.startsWith('image/')) {
          const base64 = await fileToBase64(file);
          const msg = { role: 'user', type: 'image', content: base64, timestamp: getTimeString(), fileName: file.name, fileSize: formatSize(file.size) };
          messages.push(msg);
          await saveMessage(msg);
        } else {
          const text = await file.text();
          const msg = { role: 'user', type: 'file', content: text, timestamp: getTimeString(), fileName: file.name, fileSize: formatSize(file.size) };
          messages.push(msg);
          await saveMessage(msg);
        }
        incrementDailyCount();
        renderChat();
      };
      input.click();
    }
    function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}


    async function triggerAIReply() {
      if (selectMode) return;
      if (messages.length === 0) return;
      if (messages[messages.length-1].role === 'ai') return;
      if (!settings.apiUrl || !settings.apiKey) {
        const fake = { role: 'ai', type: 'text', content: '（请先配置 API）我也爱你~', timestamp: getTimeString() };
        messages.push(fake);
        await saveMessage(fake);
        incrementDailyCount();
        renderChat();
        return;
      }
      const inputArea = document.querySelector('.input-area');
      const hint = document.createElement('div');
      hint.className = 'typing-hint'; hint.id = 'typingHint'; hint.textContent = 'AI 正在输入…';
      inputArea.parentNode.insertBefore(hint, inputArea);
      try {
        const reply = await callAI();
        hint.remove();
        const segments = reply.split(/\n?---\n?/).filter(s => s.trim() !== '');
        if (segments.length > 0) {
           // 第一条立即发送
           const firstMsg = { role: 'ai', type: 'text', content: segments[0].trim(), timestamp: getTimeString() };
           messages.push(firstMsg);
           await saveMessage(firstMsg);
           incrementDailyCount();
           renderChat();

           // 后续每段延迟 1.5 秒后再发送
           for (let i = 1; i < segments.length; i++) {
             await delay(1500); // 间隔1.5秒，可自行调整
             const nextMsg = { role: 'ai', type: 'text', content: segments[i].trim(), timestamp: getTimeString() };
             messages.push(nextMsg);
             await saveMessage(nextMsg);
             incrementDailyCount();
             renderChat();
          }
        }
      } catch(e) {
        hint.remove();
        const errMsg = { role: 'ai', type: 'text', content: 'AI 回复失败: ' + e.message, timestamp: getTimeString() };
        messages.push(errMsg);
        await saveMessage(errMsg);
        incrementDailyCount();
        renderChat();
      }
    }

    async function callAI() {
      const url = settings.apiUrl.replace(/\/+$/, '') + '/v1/chat/completions';
      let memoryCtx = '', annivCtx = '';
      const mem = settings.memories;
      if (mem.core.length) memoryCtx += '核心记忆: ' + mem.core.map(m=>m.event).join('; ') + '\n';
      if (mem.important.length) memoryCtx += '重要事件: ' + mem.important.map(m=>m.event).join('; ') + '\n';
      if (mem.daily.length) memoryCtx += '日常记忆: ' + mem.daily.map(m=>m.event).join('; ') + '\n';
      if (settings.anniversaries.length) {
        annivCtx = '纪念日:\n' + settings.anniversaries.map(a => {
          const now = new Date(), target = new Date(a.date + 'T00:00:00');
          let diff = Math.ceil((a.type==='countup' ? now-target : target-now) / (86400000));
          if (diff < 0) diff = 0;
          let dis = diff + '天';
          if (a.unit==='months') dis = Math.floor(diff/30) + '个月';
          else if (a.unit==='years') dis = (diff/365).toFixed(1) + '年';
          return `${a.title}：${a.type==='countup'?'已经':'还有'} ${dis}（${a.date}）`;
        }).join('\n');
      }
      const system = `你是${settings.roleName}，${settings.roleInfo}。${memoryCtx ? '记忆：\n' + memoryCtx : ''}${annivCtx ? annivCtx + '\n' : ''}你可以用 <think>...</think> 包裹思考过程。回复中可包含 ---MEMORY:类别:事件:感受--- 记录记忆，用 --- 分隔多条消息，用 ---FILE:文件名:内容--- 发送文件。`;
      const recent = messages.slice(-(settings.contextRounds*2));
      const msgs = [ { role: 'system', content: system } ];
      recent.forEach(m => {
        let c = m.content;
        if (m.type==='image') c = '[用户发送了一张图片]';
        else if (m.type==='file') c = `[用户发送了文件: ${m.fileName}]\n内容: ${m.content}`;
        msgs.push({ role: m.role==='ai' ? 'assistant' : 'user', content: c });
      });
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${settings.apiKey}` },
        body: JSON.stringify({ model: settings.model, messages: msgs, temperature: 0.9 })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const d = await res.json();
      let reply = d.choices[0].message.content;
      const memRegex = /---MEMORY:(\w+):(.+?):(.+?)---/g;
      let m;
      while ((m = memRegex.exec(reply))) {
        const cat = m[1].toLowerCase();
        if (['core','important','daily'].includes(cat)) {
          settings.memories[cat].push({ event: m[2].trim(), feeling: m[3].trim(), time: getFullTimeString() });
        }
      }
      reply = reply.replace(/---MEMORY:\w+:.+?:.+?---/g, '').trim();
      const fileRegex = /---FILE:(.+?):([\s\S]*?)---/g;
      while ((m = fileRegex.exec(reply))) {
        const fileMsg = { role: 'ai', type: 'file', content: m[2].trim(), timestamp: getTimeString(), fileName: m[1].trim(), fileSize: formatSize(new Blob([m[2]]).size) };
        messages.push(fileMsg);
        await saveMessage(fileMsg);
      }
      reply = reply.replace(/---FILE:.+?:[\s\S]*?---/g, '').trim();
      await saveSetting('memories', settings.memories);
      return reply;
    }

    // 气泡菜单
    function showBubbleMenu(index, x, y) {
      currentMenuMsgIndex = index;
      const menu = document.getElementById('bubbleMenu');
      menu.style.left = x + 'px'; menu.style.top = y + 'px';
      menu.style.display = 'flex';
      setTimeout(() => document.addEventListener('click', hideBubbleMenu, { once: true }), 100);
    }
    function hideBubbleMenu() { document.getElementById('bubbleMenu').style.display = 'none'; }
    function quoteMessage() { hideBubbleMenu(); setQuoteFromMessage(currentMenuMsgIndex); }
    async function deleteSingleMessage() {
      hideBubbleMenu();
      if (!confirm('确定删除这条消息吗？')) return;
      const idx = currentMenuMsgIndex;
      const del = messages.splice(idx, 1)[0];
      if (del?.id) { const tx = db.transaction('messages', 'readwrite'); tx.objectStore('messages').delete(del.id); await tx.done; }
      renderChat();
    }
    async function deleteMessagesBelow() {
      hideBubbleMenu();
      if (!confirm('删除这条及之后的所有消息？')) return;
      const toDel = messages.splice(currentMenuMsgIndex);
      const tx = db.transaction('messages', 'readwrite');
      for (const m of toDel) if (m.id) tx.objectStore('messages').delete(m.id);
      await tx.done;
      renderChat();
    }

    // 日落归档
    async function sunsetArchive() {
      const now = new Date();
      const hour = now.getHours();
      const today = getDateString();
      if ((hour === 12 || hour === 0) && settings.lastArchiveDate !== today) {
        const todayMsgs = messages.filter(m => true);
        if (todayMsgs.length && settings.apiUrl && settings.apiKey) {
          const prompt = `请根据以下聊天记录整理记忆，核心/重要可不记，日常至少一条。格式：---MEMORY:类别:事件:感受---\n` + todayMsgs.map(m => `[${m.role==='user'?'我':settings.roleName}] ${m.content}`).join('\n');
          try {
            const res = await fetch(settings.apiUrl.replace(/\/+$/,'') + '/v1/chat/completions', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${settings.apiKey}` },
              body: JSON.stringify({ model: settings.model, messages: [{ role: 'user', content: prompt }], temperature: 0.5 })
            });
            if (res.ok) {
              const d = await res.json();
              const rep = d.choices[0].message.content;
              const regex = /---MEMORY:(\w+):(.+?):(.+?)---/g;
              let m;
              while ((m = regex.exec(rep))) {
                const cat = m[1].toLowerCase();
                if (['core','important','daily'].includes(cat)) settings.memories[cat].push({ event: m[2].trim(), feeling: m[3].trim(), time: getFullTimeString() });
              }
              await saveSetting('memories', settings.memories);
            }
          } catch(e) { console.log('归档失败', e); }
        }
        settings.lastArchiveDate = today;
        await saveSetting('lastArchiveDate', today);
      }
    }
    function startArchiveTimer() { setInterval(sunsetArchive, 60000); }
        // ========== 记忆功能 ==========
    function showAddMemoryForm(category) {
      currentEditIndex[category] = -1;
      const card = document.getElementById(category + 'EditCard');
      card.classList.add('active');
      document.getElementById(category + 'EditTime').value = '';
      document.getElementById(category + 'EditEvent').value = '';
      document.getElementById(category + 'EditFeeling').value = '';
    }

    function showEditMemoryForm(category, index) {
      currentEditIndex[category] = index;
      const item = settings.memories[category][index];
      const card = document.getElementById(category + 'EditCard');
      card.classList.add('active');
      document.getElementById(category + 'EditTime').value = item.time || '';
      document.getElementById(category + 'EditEvent').value = item.event || '';
      document.getElementById(category + 'EditFeeling').value = item.feeling || '';
    }

    function hideEditForm(category) {
      document.getElementById(category + 'EditCard').classList.remove('active');
      currentEditIndex[category] = -1;
    }

    async function saveMemoryFromForm(category) {
      const time = document.getElementById(category + 'EditTime').value.trim();
      const event = document.getElementById(category + 'EditEvent').value.trim();
      const feeling = document.getElementById(category + 'EditFeeling').value.trim();
      if (!event && !feeling) { alert('至少填写事件或感受'); return; }
      const finalTime = time || getFullTimeString();
      const newItem = { event, feeling, time: finalTime };
      if (currentEditIndex[category] >= 0) {
        settings.memories[category][currentEditIndex[category]] = newItem;
      } else {
        settings.memories[category].push(newItem);
      }
      await saveSetting('memories', settings.memories);
      hideEditForm(category);
      renderAllMemories();
    }

    async function deleteMemory(category, index) {
      if (!confirm('确定删除这条记忆吗？')) return;
      settings.memories[category].splice(index, 1);
      await saveSetting('memories', settings.memories);
      renderAllMemories();
    }

    function renderAllMemories() {
      renderMemoryList('core', document.getElementById('coreMemoryList'));
      renderMemoryList('important', document.getElementById('importantMemoryList'));
      renderMemoryList('daily', document.getElementById('dailyMemoryList'));
    }

    function renderMemoryList(category, container) {
      if (!container) return;
      container.innerHTML = '';
      const list = settings.memories[category] || [];
      list.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'memory-item';
        div.style.flexDirection = 'column';
        div.style.alignItems = 'flex-start';
        div.innerHTML = `
          <div style="font-size:11px; color:#999; margin-bottom:2px;">${item.time}</div>
          <div style="font-size:14px; margin-bottom:2px;">${item.event || '(无内容)'}</div>
          <div style="font-size:13px; color:#8a7b6e;">${item.feeling ? '💭 ' + item.feeling : ''}</div>
          <div class="memory-actions" style="align-self: flex-end; margin-top: 4px;">
            <button onclick="showEditMemoryForm('${category}', ${index})">✏️</button>
            <button onclick="deleteMemory('${category}', ${index})">🗑️</button>
          </div>`;
        container.appendChild(div);
      });
    }

    // ========== 情侣头像管理 ==========
    function openCoupleAvatarsPage() { renderCoupleList(); openSubPage('coupleAvatarsPage'); }

    function renderCoupleList() {
      const container = document.getElementById('coupleList');
      if (!container) return;
      container.innerHTML = '';
      settings.coupleAvatars.forEach((pair, index) => {
        const div = document.createElement('div');
        div.className = 'couple-pair';
        div.innerHTML = `
          <strong>${pair.name || '配对' + (index+1)}</strong>
          <img src="${pair.my}" alt="我的头像">
          <img src="${pair.ai}" alt="AI头像">
          <button onclick="selectCouplePair(${index})">应用</button>
          <button onclick="deleteCouplePair(${index})">删除</button>`;
        container.appendChild(div);
      });
    }

    function showAddCoupleForm() {
      document.getElementById('coupleAddCard').classList.add('active');
      document.getElementById('couplePairName').value = '';
      document.getElementById('aiAvatarInput').value = '';
      document.getElementById('myAvatarInput').value = '';
      document.getElementById('aiAvatarPreview').style.backgroundImage = '';
      document.getElementById('myAvatarPreview').style.backgroundImage = '';
    }

    function hideAddCoupleForm() {
      document.getElementById('coupleAddCard').classList.remove('active');
    }

    function previewAvatar(type) {
      const input = document.getElementById(type + 'AvatarInput');
      const preview = document.getElementById(type + 'AvatarPreview');
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => { preview.style.backgroundImage = `url(${e.target.result})`; };
        reader.readAsDataURL(input.files[0]);
      }
    }

    async function saveNewCouplePair() {
      const name = document.getElementById('couplePairName').value.trim();
      if (!name) { alert('请输入配对名称'); return; }
      const aiFile = document.getElementById('aiAvatarInput').files[0];
      const myFile = document.getElementById('myAvatarInput').files[0];
      if (!aiFile || !myFile) { alert('请选择两张头像'); return; }
      const aiBase64 = await fileToBase64(aiFile);
      const myBase64 = await fileToBase64(myFile);
      settings.coupleAvatars.push({ name, my: myBase64, ai: aiBase64 });
      await saveSetting('coupleAvatars', settings.coupleAvatars);
      hideAddCoupleForm();
      renderCoupleList();
    }

    async function selectCouplePair(index) {
      const pair = settings.coupleAvatars[index];
      if (!pair) return;
      settings.roleAvatar = pair.ai;
      await saveSetting('roleAvatar', pair.ai);
      renderChat();
      alert('已应用情侣头像 ' + (pair.name || ''));
    }

    async function deleteCouplePair(index) {
      settings.coupleAvatars.splice(index, 1);
      await saveSetting('coupleAvatars', settings.coupleAvatars);
      renderCoupleList();
    }

    async function selectCoupleAvatar() {
      if (settings.coupleAvatars.length === 0) { alert('请先到设置-情侣头像中添加配对'); return; }
      const names = settings.coupleAvatars.map(p => p.name || '未命名');
      const choice = prompt('选择情侣头像配对:\n' + names.map((n, i) => `${i+1}. ${n}`).join('\n'));
      if (!choice) return;
      const idx = parseInt(choice) - 1;
      if (idx >= 0 && idx < settings.coupleAvatars.length) await selectCouplePair(idx);
    }

    // ========== 角色信息 ==========
    function openRoleInfo() {
      document.getElementById('roleName').value = settings.roleName;
      document.getElementById('roleExtraInfo').value = settings.roleInfo;
      updateRoleAvatarPreview();
      openSubPage('roleInfoPage');
    }

    async function saveRoleInfo() {
      settings.roleName = document.getElementById('roleName').value;
      settings.roleInfo = document.getElementById('roleExtraInfo').value;
      await saveSetting('roleName', settings.roleName);
      await saveSetting('roleInfo', settings.roleInfo);
      updateHeaderTitle();
      closeSubPage('roleInfoPage');
    }

    function updateRoleAvatarPreview() {
      const preview = document.getElementById('roleAvatarPreview');
      if (settings.roleAvatar) preview.style.backgroundImage = `url(${settings.roleAvatar})`;
    }

    async function changeRoleAvatar() {
      const file = await selectImageFile();
      if (!file) return;
      const base64 = await fileToBase64(file);
      settings.roleAvatar = base64;
      await saveSetting('roleAvatar', base64);
      updateRoleAvatarPreview();
    }

    // ========== 通用工具 ==========
    function selectImageFile() {
      return new Promise(resolve => {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*';
        input.onchange = () => resolve(input.files[0]);
        input.click();
      });
    }

    function fileToBase64(file) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      });
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    // ========== API 配置 ==========
    function openApiConfig() {
      document.getElementById('apiUrl').value = settings.apiUrl;
      document.getElementById('apiKey').value = settings.apiKey;
      document.getElementById('modelName').value = settings.model;
      openSubPage('apiConfigPage');
    }

    async function fetchModels() {
      const url = document.getElementById('apiUrl').value.replace(/\/+$/, '') + '/v1/models';
      const key = document.getElementById('apiKey').value;
      try {
        const resp = await fetch(url, { headers: { 'Authorization': `Bearer ${key}` } });
        const data = await resp.json();
        const select = document.getElementById('modelSelect');
        select.innerHTML = '';
        data.data.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id; opt.textContent = m.id; select.appendChild(opt);
        });
        alert('模型列表已加载');
      } catch (e) { alert('获取失败: ' + e.message); }
    }

    async function saveApiConfig() {
      settings.apiUrl = document.getElementById('apiUrl').value.trim();
      settings.apiKey = document.getElementById('apiKey').value.trim();
      const selected = document.getElementById('modelSelect').value;
      settings.model = selected || document.getElementById('modelName').value.trim();
      await saveSetting('apiUrl', settings.apiUrl);
      await saveSetting('apiKey', settings.apiKey);
      await saveSetting('model', settings.model);
      closeSubPage('apiConfigPage');
    }

    // ========== 搜索、对话设置、数据管理 ==========
    function openSearch() {
      document.getElementById('searchKeyword').value = '';
      document.getElementById('searchResults').innerHTML = '';
      openSubPage('searchPage');
    }

    function performSearch() {
      const keyword = document.getElementById('searchKeyword').value.trim().toLowerCase();
      const resultsDiv = document.getElementById('searchResults');
      resultsDiv.innerHTML = '';
      if (!keyword) return;
      const matches = messages.filter(m => m.content && m.content.toLowerCase().includes(keyword));
      matches.forEach(m => {
        const div = document.createElement('div');
        div.className = 'search-result';
        const snippet = (m.content || '').substring(0, 50) + ((m.content || '').length > 50 ? '...' : '');
        div.textContent = `[${m.role === 'user' ? '我' : settings.roleName}] ${snippet}`;
        div.onclick = () => {
          closeSubPage('searchPage');
          switchPage('chat');
          setTimeout(() => {
            const index = messages.findIndex(msg => msg.id === m.id);
            if (index !== -1) document.getElementById('chatContainer').children[index]?.scrollIntoView({ behavior: 'smooth' });
          }, 300);
        };
        resultsDiv.appendChild(div);
      });
    }

    function openDialogSettings() {
      document.getElementById('contextRounds').value = settings.contextRounds;
      openSubPage('dialogSettingsPage');
    }

    async function saveDialogSettings() {
      settings.contextRounds = parseInt(document.getElementById('contextRounds').value) || 4;
      await saveSetting('contextRounds', settings.contextRounds);
      closeSubPage('dialogSettingsPage');
    }

    function openDataManage() {
      document.getElementById('importFile').value = '';
      document.getElementById('importStatus').textContent = '';
      openSubPage('dataManagePage');
    }

    async function exportData() {
      const tx = db.transaction('messages', 'readonly');
      const store = tx.objectStore('messages');
      const allMessages = await new Promise(resolve => { const req = store.getAll(); req.onsuccess = () => resolve(req.result); });
      const exportObj = { version: 3, exportedAt: new Date().toISOString(), messages: allMessages, settings: settings };
      const jsonStr = JSON.stringify(exportObj, null, 2);
      const blob = new Blob([jsonStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `ai-lover-backup-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      alert('导出成功！');
    }

    async function importData() {
      const fileInput = document.getElementById('importFile');
      const statusDiv = document.getElementById('importStatus');
      if (!fileInput.files.length) return;
      const file = fileInput.files[0];
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        if (!data.messages || !data.settings) throw new Error('无效的备份文件格式');
        if (!confirm('导入将覆盖当前所有数据，确定继续吗？')) return;
        await new Promise((resolve, reject) => {
          const tx = db.transaction(['messages', 'settings'], 'readwrite');
          tx.objectStore('messages').clear();
          tx.objectStore('settings').clear();
          tx.oncomplete = () => resolve();
          tx.onerror = (e) => reject(e);
        });
        for (const [key, value] of Object.entries(data.settings)) {
          await saveSetting(key, value);
        }
        const tx = db.transaction('messages', 'readwrite');
        const store = tx.objectStore('messages');
        for (const msg of data.messages) {
          if (msg.id) await store.put(msg);
          else await store.add(msg);
        }
        await tx.done;
        await loadSettings();
        await loadMessages();
        statusDiv.textContent = '✅ 导入成功！';
        statusDiv.style.color = 'green';
        fileInput.value = '';
      } catch (e) {
        statusDiv.textContent = '❌ 导入失败：' + e.message;
        statusDiv.style.color = 'red';
      }
    }

    // ========== 纪念日 ==========
    function showAddAnniversaryForm() {
      currentAnnivIndex = -1;
      document.getElementById('annivTitle').value = '';
      document.getElementById('annivDate').value = '';
      document.getElementById('annivType').value = 'countup';
      document.getElementById('annivUnit').value = 'days';
      document.getElementById('annivColor').value = '#b8a99a';
      document.getElementById('annivEditCard').classList.add('active');
    }

    function showEditAnniversaryForm(index) {
      currentAnnivIndex = index;
      const a = settings.anniversaries[index];
      document.getElementById('annivTitle').value = a.title;
      document.getElementById('annivDate').value = a.date;
      document.getElementById('annivType').value = a.type;
      document.getElementById('annivUnit').value = a.unit || 'days';
      document.getElementById('annivColor').value = a.color;
      document.getElementById('annivEditCard').classList.add('active');
    }

    function hideAnnivForm() {
      document.getElementById('annivEditCard').classList.remove('active');
      currentAnnivIndex = -1;
    }

    async function saveAnniversary() {
      const title = document.getElementById('annivTitle').value.trim();
      const date = document.getElementById('annivDate').value;
      const type = document.getElementById('annivType').value;
      const unit = document.getElementById('annivUnit').value;
      const color = document.getElementById('annivColor').value;
      if (!title || !date) { alert('请填写标题和日期'); return; }
      const newItem = { title, date, type, unit, color };
      if (currentAnnivIndex >= 0) settings.anniversaries[currentAnnivIndex] = newItem;
      else settings.anniversaries.push(newItem);
      await saveSetting('anniversaries', settings.anniversaries);
      hideAnnivForm();
      renderAnniversaries();
    }

    async function deleteAnniversary(index) {
      if (!confirm('删除这个纪念日吗？')) return;
      settings.anniversaries.splice(index, 1);
      await saveSetting('anniversaries', settings.anniversaries);
      renderAnniversaries();
    }

    function renderAnniversaries() {
      const grid = document.getElementById('annivGrid');
      if (!grid) return;
      grid.innerHTML = '';
      const today = new Date();
      settings.anniversaries.forEach((a, index) => {
        const target = new Date(a.date + 'T00:00:00');
        const diffTime = a.type === 'countup' ? (today - target) : (target - today);
        let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        if (diffDays < 0) diffDays = 0;
        let display = diffDays + '天';
        if (a.unit === 'months') display = Math.floor(diffDays / 30) + '个月';
        else if (a.unit === 'years') display = (diffDays / 365).toFixed(1) + '年';
        const card = document.createElement('div');
        card.className = 'anniv-card';
        card.style.background = a.color;
        card.innerHTML = `
          <div class="title">${a.title}</div>
          <div class="days">${display}</div>
          <div class="subtitle">${a.date}</div>
          <div style="position:absolute; top:4px; right:4px; font-size:12px; opacity:0.8;" onclick="event.stopPropagation(); showEditAnniversaryForm(${index})">✏️</div>`;
        card.addEventListener('click', () => { if (confirm('编辑或删除这个纪念日？')) showEditAnniversaryForm(index); });
        card.addEventListener('contextmenu', e => { e.preventDefault(); deleteAnniversary(index); });
        grid.appendChild(card);
      });
    }

    // ========== 热力图 ==========
    function renderHeatmap() {
      const year = heatmapYearMonth.getFullYear();
      const month = heatmapYearMonth.getMonth();
      document.getElementById('heatmapMonthLabel').textContent = `${year}年${month+1}月`;
      const grid = document.getElementById('heatmapGrid');
      grid.innerHTML = '';
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month+1, 0).getDate();
      for (let i = 0; i < firstDay; i++) {
        const cell = document.createElement('div');
        cell.className = 'heatmap-cell empty';
        grid.appendChild(cell);
      }
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const count = settings.dailyMessageCounts[dateStr] || 0;
        const cell = document.createElement('div');
        cell.className = 'heatmap-cell';
        cell.textContent = d;
        let bucket = Math.min(Math.floor(count / 100), 15);
        const r = Math.round(245 - (245-93) * bucket/15);
        const g = Math.round(241 - (241-64) * bucket/15);
        const b = Math.round(234 - (234-55) * bucket/15);
        cell.style.background = `rgb(${r},${g},${b})`;
        cell.style.color = bucket > 7 ? '#fff' : '#666';
        grid.appendChild(cell);
      }
    }
    function changeHeatmapMonth(delta) {
      heatmapYearMonth.setMonth(heatmapYearMonth.getMonth() + delta);
      renderHeatmap();
    }

    // ========== 设置页面交互 ==========
    function openSettings() { document.getElementById('settingsOverlay').classList.add('active'); }
    function closeSettings() { document.getElementById('settingsOverlay').classList.remove('active'); }
    function openSubPage(id) { document.getElementById(id).classList.add('active'); }
    function closeSubPage(id) { document.getElementById(id).classList.remove('active'); }

    // ========== Service Worker ==========
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/Palino-s-home/sw.js')
        .then(reg => {
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                if (confirm('发现新版本，点击确定刷新页面')) window.location.reload();
              }
            });
          });
        }).catch(err => console.log('SW 注册失败', err));
    }

    // ========== 启动 ==========
    (async function init() {
      await openDB();
      await loadSettings();
      await loadMessages();

      // 清理旧版残留“正在输入…”
      const cleanTx = db.transaction('messages', 'readwrite');
      const cleanStore = cleanTx.objectStore('messages');
      const allMsgs = await new Promise(r => { const req = cleanStore.getAll(); req.onsuccess = () => r(req.result); });
      for (const m of allMsgs) {
        if (m.role === 'ai' && m.content === '正在输入…') {
          await cleanStore.delete(m.id);
        }
      }
      await cleanTx.done;
      await loadMessages();
      renderChat();

      const msgInput = document.getElementById('msgInput');
      msgInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
      });

      // 启动归档定时器
      startArchiveTimer();
    })();
  </script>
